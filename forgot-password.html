<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <style>
        /* Using the same style as login page for consistency */
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; background: #6a5acd; }
        .container { background: rgba(255, 255, 255, 0.1); padding: 3rem; border-radius: 15px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); backdrop-filter: blur(10px); text-align: center; color: white; width: 380px; }
        h1 { margin-bottom: 2rem; }
        input { width: calc(100% - 2rem); padding: 1rem; background: transparent; border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 8px; color: white; font-size: 1rem; margin-bottom: 1.5rem; }
        button { width: 100%; padding: 1rem; border: none; border-radius: 8px; background: linear-gradient(135deg, #89f7fe, #66a6ff); color: #1a1a2e; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        p { margin-top: 1rem; }
        .info-text {
            color: #e0e0e0; /* Changed from pure white to a light grey for better visibility */
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Forgot Password</h1>
        <p class="info-text">Enter your email address and we will send you an OTP to reset your password.</p>
        <form action="send-otp.html" method="POST">
            <input type="email" name="email" placeholder="Enter your registered email" required>
            <button type="submit">Send OTP</button>
        </form>
        <p><a href="index.html" style="color: #89f7fe;">Back to Login</a></p>
    </div>
