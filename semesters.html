<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Select Semester</title>
    <style>
        body,
        h1,
        p,
        a,
        div {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            width: 90%;
            padding: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #2c3e50;
        }

        header p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 3rem;
        }

        .semester-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            perspective: 1000px;
        }

        .semester-card {
            background-color: #ffffff;
            color: #3498db;
            text-decoration: none;
            padding: 4rem 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 2rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hover: hovered card forward, others pull back */
        .semester-selection:hover .semester-card {
            transform: scale(0.93) translateZ(-20px);
            opacity: 0.65;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .semester-selection:hover .semester-card:hover {
            transform: scale(1.12) translateZ(30px);
            opacity: 1;
            box-shadow: 0 0 36px 6px rgba(52, 152, 219, 0.45);
            color: #2980b9;
        }

        footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Select Your Semester</h1>
            <p>Branch: <strong id="branch-display"></strong> | Year: <strong id="year-display"></strong></p>
        </header>
        <main>
            <div class="semester-selection" id="semester-selection-container">
                <!-- Dynamically generated by JS -->
            </div>
        </main>
        <footer>
            <p>&copy; 2025 Academic Portal. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const branch = params.get('branch');
            const year = params.get('year');
            const userRole = localStorage.getItem('role') || 'user';

            const semesterContainer = document.getElementById('semester-selection-container');

            if (branch && year) {
                document.getElementById('branch-display').textContent = branch.toUpperCase();
                document.getElementById('year-display').textContent = year;

                let sem1_num, sem2_num;
                if (year == '1') { sem1_num = 1; sem2_num = 2; }
                else if (year == '2') { sem1_num = 3; sem2_num = 4; }
                else if (year == '3') { sem1_num = 5; sem2_num = 6; }

                const targetPage = 'user_subjects.html';

                if (sem1_num && sem2_num) {
                    semesterContainer.innerHTML = `
                        <a href="${targetPage}?semester=${sem1_num}&year=${year}&branch=${branch}" class="semester-card">Semester ${sem1_num}</a>
                        <a href="${targetPage}?semester=${sem2_num}&year=${year}&branch=${branch}" class="semester-card">Semester ${sem2_num}</a>
                    `;
                }
            }
        });
    </script>

    <!-- Page fade-in on load -->
    <script>
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.4s ease';
        window.addEventListener('load', () => {
            requestAnimationFrame(() => { document.body.style.opacity = '1'; });
        });
    </script>
</body>

</html>
