<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #6a5acd;
            /* Fallback color */
            background-image: url('corrected.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
            perspective: 1200px;
        }

        .main-container {
            position: relative;
            width: 380px;
            height: 550px;
        }

        .panel {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.7);
            /* Dark semi-transparent background */
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2.5rem;
            box-sizing: border-box;
            transition: transform 0.6s ease-in-out, opacity 0.5s ease-in-out;
            backface-visibility: hidden;
        }

        .panel:not(.active) {
            transform: scale(0.9) rotateY(30deg);
            opacity: 0;
            pointer-events: none;
        }

        .panel.active {
            transform: scale(1) rotateY(0deg);
            opacity: 1;
            pointer-events: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            font-weight: 600;
        }

        /* Role Selection Styles */
        .role-selection {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .role-btn {
            padding: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.7);
            background: transparent;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
            transform: translateY(-5px);
        }

        .password-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-group input {
            width: 100%;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            cursor: pointer;
            user-select: none;
            /* Prevents selecting the icon text */
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-hide {
            display: none;
            /* Hide the slashed eye icon by default */
        }



        /* Form Styles */
        .input-group {
            margin-bottom: 1.2rem;
            position: relative;
        }

        .input-group input {
            width: calc(100% - 2rem);
            padding: 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #89f7fe;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .action-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            color: #1a1a2e;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 20px rgba(102, 166, 255, 0.5);
        }

        .message {
            color: #ffcccc;
            margin-top: 0.8rem;
            height: 20px;
            font-weight: bold;
            text-align: center;
        }

        .bottom-text {
            text-align: center;
            margin-top: 1.5rem;
        }

        .bottom-text a,
        .back-link {
            color: #89f7fe;
            text-decoration: none;
            cursor: pointer;
            font-weight: bold;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
        }

        .password-requirements {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            text-align: left;
            margin-top: -0.8rem;
            /* Move it closer to the password field */
            margin-bottom: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="main-container">

        <!-- Panel 1: Role Selection -->
        <div id="selection-panel" class="panel active">
            <h1>Welcome!</h1>
            <div class="role-selection">
                <button class="role-btn" id="select-user">I am a User</button>
                <button class="role-btn" id="select-admin">I am an Admin</button>
            </div>
        </div>

        <!-- Panel 2: User Login -->
        <div id="user-login-panel" class="panel">
            <h1>User Login</h1>
            <form id="login-form">
                <input type="hidden" name="role" value="user">
                <div class="input-group">
                    <input type="text" id="login-username" name="login-username" placeholder="Username or Email"
                        required>
                </div>
                <div class="input-group password-group">
                    <input type="password" id="login-password" name="login-password" placeholder="Password" required>
                    <span class="toggle-password" onclick="togglePassword('login-password')">
                        <svg class="icon-show" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="icon-hide" viewBox="0 0 24 24">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.01L3 21">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
                <button type="submit" class="action-btn">Login</button>
                <p class="message" id="login-message"></p>
            </form>
            <div class="bottom-text">
                <a href="forgot-password.html">Forgot Password?</a>
                <p style="margin-top: 1rem;">Don't have an account? <a id="show-signup">Create one</a></p>
                <a href="#" class="back-link" data-target="selection-panel">← Go Back</a>
            </div>
        </div>

        <!-- Panel 3: Admin Login -->
        <div id="admin-login-panel" class="panel">
            <h1>Admin Login</h1>
            <form id="admin-login-form">
                <input type="hidden" name="role" value="admin">
                <div class="input-group">
                    <input type="text" id="admin-username" name="login-username" placeholder="Admin Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="admin-password" name="login-password" placeholder="Admin Password"
                        required>
                    <span class="toggle-password" onclick="togglePassword('admin-password')">
                        <svg class="icon-show" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="icon-hide" viewBox="0 0 24 24">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.01L3 21">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
                <button type="submit" class="action-btn">Admin Login</button>
                <p class="message" id="admin-message"></p>
            </form>
            <a href="#" class="back-link" data-target="selection-panel">← Go Back</a>
        </div>

        <!-- Panel 4: User Sign Up -->
        <div id="signup-panel" class="panel">
            <h1>Create Account</h1>
            <form id="signup-form">
                <div class="input-group">
                    <input type="text" id="signup-username" name="signup-username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="email" id="signup-email" name="signup-email" placeholder="Email" required>
                </div>
                <div class="input-group password-group">
                    <input type="password" id="signup-password" name="signup-password" placeholder="Password" required>
                    <span class="toggle-password" onclick="togglePassword('signup-password')">
                        <svg class="icon-show" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="icon-hide" viewBox="0 0 24 24">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.01L3 21">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
                <p class="password-requirements">Min 6 characters, must include letters & numbers.</p>
                <button type="submit" class="action-btn">Sign Up</button>
                <p class="message" id="signup-message"></p>
            </form>
            <p class="bottom-text">Already have an account? <a id="show-signin">Sign In</a></p>
        </div>

    </div>

    <script>
        // Check local storage for token
        if (localStorage.getItem('token')) {
            window.location.href = 'students.html';
        }

        async function handleLogin(e, formId, userType) {
            e.preventDefault();
            const username = document.getElementById(userType === 'user' ? 'login-username' : 'admin-username').value;
            const password = document.getElementById(userType === 'user' ? 'login-password' : 'admin-password').value;
            const messageEl = document.getElementById(userType === 'user' ? 'login-message' : 'admin-message');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username_or_email: username, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('username', data.username);
                    window.location.href = 'students.html';
                } else {
                    messageEl.textContent = data.error;
                }
            } catch (err) {
                messageEl.textContent = 'Server error. Try again.';
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const messageEl = document.getElementById('signup-message');

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, role: 'student' })
                });
                const data = await res.json();
                if (data.success) {
                    messageEl.textContent = 'Signup successful! Please log in.';
                    messageEl.style.color = 'lightgreen';
                    setTimeout(() => document.getElementById('show-signin').click(), 2000);
                } else {
                    messageEl.textContent = data.error;
                }
            } catch (err) {
                messageEl.textContent = 'Server error. Try again.';
            }
        }

        document.getElementById('login-form').addEventListener('submit', (e) => handleLogin(e, 'login-form', 'user'));
        document.getElementById('admin-login-form').addEventListener('submit', (e) => handleLogin(e, 'admin-login-form', 'admin'));
        document.getElementById('signup-form').addEventListener('submit', handleSignup);

        function togglePassword(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const toggleContainer = passwordField.nextElementSibling;
            const showIcon = toggleContainer.querySelector('.icon-show');
            const hideIcon = toggleContainer.querySelector('.icon-hide');

            // Toggle the type attribute
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);

            // Toggle the icon visibility
            if (type === 'password') {
                showIcon.style.display = 'block';
                hideIcon.style.display = 'none';
            } else {
                showIcon.style.display = 'none';
                hideIcon.style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const panels = document.querySelectorAll('.panel');

            function showPanel(panelId) {
                panels.forEach(panel => {
                    if (panel.id === panelId) {
                        panel.classList.add('active');
                    } else {
                        panel.classList.remove('active');
                    }
                });
            }

            // Role selection buttons
            document.getElementById('select-user').addEventListener('click', () => showPanel('user-login-panel'));
            document.getElementById('select-admin').addEventListener('click', () => showPanel('admin-login-panel'));

            // Back links
            document.querySelectorAll('.back-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    showPanel(e.target.dataset.target);
                });
            });

            // Links between user login and signup
            document.getElementById('show-signup').addEventListener('click', (e) => {
                e.preventDefault();
                showPanel('signup-panel');
            });
            document.getElementById('show-signin').addEventListener('click', (e) => {
                e.preventDefault();
                showPanel('user-login-panel');
            });
        });
    </script>

    <!-- Script to disable right-click and certain key combinations -->
    <script>
        // Disable right-click
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        });

        // Disable specific key combinations
        document.addEventListener('keydown', function (e) {
            // Normalize event object
            var event = e || window.event;

            // Block Ctrl+C, Ctrl+V, Ctrl+U (with alert)
            if (event.ctrlKey && (event.keyCode === 67 || event.keyCode === 86 || event.keyCode === 85 || event.keyCode === 117)) {
                alert('This website is protected against attempts to clone. Your IP has been duly recorded on our server and if you persist it will be forwarded to the competent authorities');
                event.preventDefault();
                return false;
            }

            // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) { e.preventDefault(); }

            return true;
        });
    </script>

</body>

</html>
