<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Select Semester</title>
    <style>
        body,
        h1,
        p,
        a,
        div {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: #fce4ec;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            width: 90%;
            padding: 2rem;
        }

        .header-bar {
            position: absolute;
            top: 1rem;
            right: 2rem;
            color: #333;
            font-size: 1rem;
        }

        .logout-btn {
            margin-left: 1rem;
            padding: 5px 10px;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .back-btn {
            padding: 5px 10px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-right: 15px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #2c3e50;
        }

        header p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 3rem;
        }

        .semester-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            perspective: 1000px;
        }

        .semester-card {
            background-color: #ffffff;
            color: #e67e22;
            text-decoration: none;
            padding: 4rem 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 2rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hover: hovered card forward, others pull back */
        .semester-selection:hover .semester-card {
            transform: scale(0.93) translateZ(-20px);
            opacity: 0.65;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .semester-selection:hover .semester-card:hover {
            transform: scale(1.12) translateZ(30px);
            opacity: 1;
            box-shadow: 0 0 36px 6px rgba(230, 126, 34, 0.45);
            color: #d35400;
        }

        footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>

<body>
    <div class="header-bar">
        ⚙ Admin Mode
        <a href="logout.html" class="logout-btn">Logout</a>
    </div>
    <div class="container">
        <header>
            <h1>Select Semester (Admin)</h1>
            <p>Branch: <strong id="branch-display"></strong> | Year: <strong id="year-display"></strong></p>
            <div style="margin-top: 20px;">
                <a href="#" id="back-link" class="back-btn">← Back to Year Selection</a>
            </div>
        </header>
        <main>
            <div class="semester-selection" id="semester-selection-container">
                <!-- Dynamically generated by JS -->
            </div>
        </main>
        <footer>
            <p>&copy; 2025 Academic Portal. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const branch = params.get('branch');
            const year = params.get('year');

            const semesterContainer = document.getElementById('semester-selection-container');
            const backLink = document.getElementById('back-link');

            if (branch && year) {
                document.getElementById('branch-display').textContent = branch.toUpperCase();
                document.getElementById('year-display').textContent = year;
                backLink.href = 'admin_year-selection.html?branch=' + encodeURIComponent(branch);

                let sem1_num, sem2_num;
                if (year == '1') { sem1_num = 1; sem2_num = 2; }
                else if (year == '2') { sem1_num = 3; sem2_num = 4; }
                else if (year == '3') { sem1_num = 5; sem2_num = 6; }

                if (sem1_num && sem2_num) {
                    semesterContainer.innerHTML = `
                        <a href="admin_subjects.html?semester=${sem1_num}&year=${year}&branch=${branch}" class="semester-card">Semester ${sem1_num}</a>
                        <a href="admin_subjects.html?semester=${sem2_num}&year=${year}&branch=${branch}" class="semester-card">Semester ${sem2_num}</a>
                    `;
                }
            }
        });
    </script>
</body>

</html>
